# Render blueprint for the CallPilot backend.
#
# Why Render (not Vercel) for the backend: state is in-memory (JOBS/CALLS/
# QUOTES) and the ElevenLabs agent simulations run 30–60s per request. That
# needs a single persistent process, which Vercel's stateless, time-limited
# serverless functions don't provide. Render runs the FastAPI app as a normal
# long-lived web service. Deploy the Next.js frontend on Vercel and point its
# BACKEND_URL env var at this service's URL.
#
# Set the secret env vars (marked sync:false) in the Render dashboard.

services:
  - type: web
    name: callpilot-backend
    runtime: python
    rootDir: backend
    plan: starter            # Paid tier: does NOT spin down. Required for the closed beta — on `free`
                             # the service sleeps after ~15 min idle and testers eat a ~50s cold start
                             # on top of the 30-60s each agent simulation already takes.
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: CALL_MODE
        value: simulation
      - key: OPENAI_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_CALLER_AGENT_ID
        sync: false
      - key: ELEVENLABS_INTERVIEW_AGENT_ID
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: ELEVENLABS_AGENT_LLM
        value: gpt-4.1
      # Telephony only (leave unset for simulation mode):
      # Live calls stay blocked until this is explicitly set to "true", even with
      # CALL_MODE=telephony — see TELEPHONY.md. It records that the call-recording
      # consent question has actually been answered, not just noted.
      - key: TELEPHONY_CONSENT_REVIEWED
        sync: false
      - key: ELEVENLABS_CALLER_PHONE_NUMBER_ID
        sync: false
      - key: WEBHOOK_BASE_URL
        sync: false
      # Supabase auth. Without SUPABASE_JWKS_URL the backend cannot verify
      # tokens, so every authenticated route returns 503 and the app loads
      # forever with empty skeletons. These two are plain public URLs.
      - key: SUPABASE_URL
        value: https://fshbdeydbotglbalgnhy.supabase.co
      - key: SUPABASE_JWKS_URL
        value: https://fshbdeydbotglbalgnhy.supabase.co/auth/v1/.well-known/jwks.json
      # The anon key is public by design (it already ships to every browser);
      # access is enforced by Row Level Security, not by hiding it. Needed here
      # so the backend can persist jobs/quotes as the signed-in user.
      - key: SUPABASE_ANON_KEY
        sync: false
      # Global monthly spend ceiling. 0 or unset disables the cap.
      - key: MONTHLY_BUDGET_USD
        value: "25"
      # CORS: set to your Vercel frontend origin in production.
      - key: CORS_ALLOW_ORIGINS
        value: "*"
